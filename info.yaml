# Tiny Tapeout project metadata
# https://tinytapeout.com

project:
  title:        "tt_um_day4_forklift"
  author:       ""
  description:  "AoC 2025 Day 4 - 8x8 forklift cellular automaton on Sky130A"
  language:     "Verilog"
  clock_hz:     50000000          # 50 MHz target (CLOCK_PERIOD = 20 ns)

  # Tile size: 4 columns x 2 rows
  tiles:        "4x2"

  # Top module
  top_module:   "tt_um_day4_forklift"

  # Source files (relative to repo root)
  source_files:
    - "src/project.v"

# Pinout (matches tt_um_* convention)
pinout:
  # ui_in[7:0] - dedicated inputs
  ui[0]: "s_tdata[0]"
  ui[1]: "s_tdata[1]"
  ui[2]: "s_tdata[2]"
  ui[3]: "s_tdata[3]"
  ui[4]: "s_tdata[4]"
  ui[5]: "s_tdata[5]"
  ui[6]: "s_tdata[6]"
  ui[7]: "s_tdata[7]"

  # uo_out[7:0] - dedicated outputs (m_tdata)
  uo[0]: "m_tdata[0]"
  uo[1]: "m_tdata[1]"
  uo[2]: "m_tdata[2]"
  uo[3]: "m_tdata[3]"
  uo[4]: "m_tdata[4]"
  uo[5]: "m_tdata[5]"
  uo[6]: "m_tdata[6]"
  uo[7]: "m_tdata[7]"

  # uio[7:0] - bidirectional
  uio[0]: "s_tvalid (in)"
  uio[1]: "m_tready (in)"
  uio[2]: "s_tready (out)"
  uio[3]: "m_tvalid (out)"
  uio[4]: "dbg_state[0] (out)"
  uio[5]: "dbg_state[1] (out)"
  uio[6]: "dbg_state[2] (out)"
  uio[7]: "dbg_first_iter (out)"
